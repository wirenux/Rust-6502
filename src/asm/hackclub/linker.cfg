MEMORY {
    ROM:     start = $C000, size = $3FFA, file = %O, fill = yes, fillval = $FF;
    VECTORS: start = $FFFA, size = $0006, file = %O, fill = yes, fillval = $FF;
}

SEGMENTS {
    CODE:    load = ROM, type = ro;
    RODATA:  load = ROM, type = ro;
    VECTORS: load = VECTORS, start = $FFFA, type = ro;
}